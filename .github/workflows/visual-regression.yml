name: visual-regression
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scenarios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: python3 scripts/build_manifest.py
      - run: npx playwright test
      - name: Upload visual report and diff images
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scenarios-visual-report
          path: |
            growth/reports/visual
            growth/reports/visual-html
          if-no-files-found: ignore
          retention-days: 14
